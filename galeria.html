<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Galeria — Llave Propia</title>
<link rel="icon" href="/favicon.ico">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Helvetica Neue',Arial,sans-serif;background:#f4f2ee;color:#1B3A6B;min-height:100vh}
.top-bar{background:linear-gradient(135deg,#1B3A6B 0%,#C9871A 100%);padding:18px 24px;text-align:center}
.top-bar img{height:32px;margin-bottom:8px}
.top-bar h1{color:#fff;font-size:20px;font-weight:700;margin:0}
.top-bar p{color:rgba(255,255,255,.65);font-size:13px;margin-top:4px}
.container{max-width:900px;margin:0 auto;padding:24px 16px}
.prop-card{background:#fff;border-radius:14px;padding:20px 24px;box-shadow:0 2px 12px rgba(0,0,0,.06);margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.prop-info h2{font-size:18px;font-weight:700;color:#1B3A6B;margin:0 0 4px}
.prop-info p{font-size:13px;color:#888;margin:0}
.btn-download{display:inline-flex;align-items:center;gap:8px;background:#C9871A;color:#fff;border:none;border-radius:50px;padding:12px 28px;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;box-shadow:0 3px 12px rgba(201,135,26,.25);text-decoration:none}
.btn-download:hover{background:#b07616;transform:translateY(-1px)}
.btn-download:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn-download svg{width:18px;height:18px}
.photos-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
.photo-item{border-radius:12px;overflow:hidden;background:#fff;box-shadow:0 2px 10px rgba(0,0,0,.06);cursor:pointer;transition:transform .15s,box-shadow .15s}
.photo-item:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.1)}
.photo-item img{width:100%;aspect-ratio:4/3;object-fit:cover;display:block}
.counter{text-align:center;margin:16px 0 4px;font-size:13px;color:#888;font-weight:600}
.counter strong{color:#1B3A6B}
.loading{text-align:center;padding:60px 20px;color:#888;font-size:15px}
.error-state{text-align:center;padding:60px 20px}
.error-state h2{font-size:18px;color:#dc2626;margin-bottom:8px}
.error-state p{font-size:14px;color:#555}
/* Lightbox */
.lightbox{display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.92);align-items:center;justify-content:center;padding:20px}
.lightbox.open{display:flex}
.lightbox img{max-width:90vw;max-height:85vh;border-radius:8px;object-fit:contain}
.lightbox .close-btn{position:absolute;top:16px;right:20px;width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.15);border:none;color:#fff;font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.lightbox .close-btn:hover{background:rgba(255,255,255,.3)}
.lightbox .nav-btn{position:absolute;top:50%;transform:translateY(-50%);width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.15);border:none;color:#fff;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.lightbox .nav-btn:hover{background:rgba(255,255,255,.3)}
.lightbox .nav-prev{left:16px}
.lightbox .nav-next{right:16px}
.lightbox .counter-lb{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.6);font-size:13px;font-weight:600}
.footer{text-align:center;padding:24px;font-size:12px;color:#bbb}
.footer a{color:#bbb}
@media(max-width:500px){
  .photos-grid{grid-template-columns:repeat(2,1fr);gap:8px}
  .prop-card{flex-direction:column;text-align:center}
}
</style>
</head>
<body>
<div class="top-bar">
  <img src="/logo-lp.png" alt="Llave Propia">
  <h1 id="page-title">Galeria de fotos</h1>
  <p id="page-subtitle"></p>
</div>

<div class="container">
  <div id="loading" class="loading">Cargando fotos...</div>

  <div id="content" style="display:none">
    <div class="prop-card">
      <div class="prop-info">
        <h2 id="prop-name"></h2>
        <p id="prop-detail"></p>
      </div>
      <button class="btn-download" id="btn-download" disabled>
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3M3 17v3a2 2 0 002 2h14a2 2 0 002-2v-3"/></svg>
        <span id="btn-download-text">Descargar todas</span>
      </button>
    </div>
    <div id="photos-grid" class="photos-grid"></div>
    <div id="counter" class="counter"></div>
  </div>

  <div id="error" style="display:none" class="error-state">
    <h2>Galeria no encontrada</h2>
    <p>Este enlace no es valido o no hay fotos disponibles.</p>
  </div>
</div>

<div class="footer">Llave Oferta &middot; <a href="https://www.llavepropia.cl">llavepropia.cl</a></div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <button class="close-btn" id="lb-close">&times;</button>
  <button class="nav-btn nav-prev" id="lb-prev">&lsaquo;</button>
  <button class="nav-btn nav-next" id="lb-next">&rsaquo;</button>
  <img id="lb-img" src="" alt="Foto">
  <div class="counter-lb" id="lb-counter"></div>
</div>

<script>
const CRM_URL = 'https://evuxdhvvarfxredghvpu.supabase.co';
const CRM_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV2dXhkaHZ2YXJmeHJlZGdodnB1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2NjQ4NzMsImV4cCI6MjA5NjI0MDg3M30.9Rv6MNHeNwb2-2shyaP9f2aUSrbDN_0syN7PTp6mLUs';

const vivId = new URLSearchParams(location.search).get('id');
let photos = [];
let currentIdx = 0;

async function init() {
  if (!vivId) { showError(); return; }

  // Fetch vivienda info (read-only, public fields only)
  const res = await fetch(`${CRM_URL}/rest/v1/viviendas?id=eq.${vivId}&select=id,nombre,tipo_vivienda,direccion,comuna`, {
    headers: { 'apikey': CRM_KEY, 'Authorization': 'Bearer ' + CRM_KEY }
  });
  const data = await res.json();
  if (!data || !data.length) { showError(); return; }

  const viv = data[0];
  const tipo = viv.tipo_vivienda === 'departamento' ? 'Departamento' : 'Casa';

  document.getElementById('page-title').textContent = tipo + ' en ' + (viv.comuna || 'propiedad');
  document.getElementById('page-subtitle').textContent = 'Galeria de fotos';
  document.getElementById('prop-name').textContent = tipo + ' en ' + (viv.comuna || '');
  document.getElementById('prop-detail').textContent = viv.direccion || '';

  // List photos
  const listRes = await fetch(`${CRM_URL}/storage/v1/object/list/vivienda-files`, {
    method: 'POST',
    headers: { 'apikey': CRM_KEY, 'Authorization': 'Bearer ' + CRM_KEY, 'Content-Type': 'application/json' },
    body: JSON.stringify({ prefix: vivId + '/', limit: 100, offset: 0 })
  });
  const files = await listRes.json();

  if (!Array.isArray(files)) { showError(); return; }
  photos = files
    .filter(f => f.name !== '.emptyFolderPlaceholder' && /\.(jpg|jpeg|png|gif|webp|heic)$/i.test(f.name))
    .map(f => `${CRM_URL}/storage/v1/object/public/vivienda-files/${vivId}/${f.name}`);

  if (photos.length === 0) { showError(); return; }

  // Render grid
  const grid = document.getElementById('photos-grid');
  photos.forEach((url, i) => {
    const div = document.createElement('div');
    div.className = 'photo-item';
    div.innerHTML = '<img src="' + url + '" alt="Foto ' + (i+1) + '">';
    div.onclick = () => openLightbox(i);
    grid.appendChild(div);
  });

  document.getElementById('counter').innerHTML = '<strong>' + photos.length + '</strong> foto' + (photos.length > 1 ? 's' : '');
  document.getElementById('btn-download').disabled = false;
  document.getElementById('btn-download-text').textContent = 'Descargar todas (' + photos.length + ')';

  document.getElementById('loading').style.display = 'none';
  document.getElementById('content').style.display = 'block';

  // Download ZIP
  document.getElementById('btn-download').onclick = async function() {
    const btn = this;
    btn.disabled = true;
    document.getElementById('btn-download-text').textContent = 'Descargando...';

    // Dynamic import JSZip from CDN
    const { default: JSZip } = await import('https://cdn.jsdelivr.net/npm/jszip@3.10.1/+esm');
    const zip = new JSZip();
    for (let i = 0; i < photos.length; i++) {
      const r = await fetch(photos[i]);
      const blob = await r.blob();
      const ext = photos[i].split('.').pop() || 'jpg';
      zip.file('foto_' + (i+1) + '.' + ext, blob);
    }
    const content = await zip.generateAsync({ type: 'blob' });
    const comunaClean = (viv.comuna || 'propiedad').replace(/\s+/g, '-');
    const fileName = tipo + '-' + comunaClean + '-fotos.zip';
    const a = document.createElement('a');
    a.href = URL.createObjectURL(content);
    a.download = fileName;
    a.click();
    URL.revokeObjectURL(a.href);

    btn.disabled = false;
    document.getElementById('btn-download-text').textContent = 'Descargar todas (' + photos.length + ')';
  };
}

function showError() {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('error').style.display = 'block';
}

// Lightbox
function openLightbox(idx) {
  currentIdx = idx;
  document.getElementById('lb-img').src = photos[idx];
  document.getElementById('lb-counter').textContent = (idx+1) + ' / ' + photos.length;
  document.getElementById('lightbox').classList.add('open');
}
document.getElementById('lb-close').onclick = () => document.getElementById('lightbox').classList.remove('open');
document.getElementById('lb-prev').onclick = () => { currentIdx = (currentIdx - 1 + photos.length) % photos.length; openLightbox(currentIdx); };
document.getElementById('lb-next').onclick = () => { currentIdx = (currentIdx + 1) % photos.length; openLightbox(currentIdx); };
document.getElementById('lightbox').onclick = (e) => { if (e.target === document.getElementById('lightbox')) document.getElementById('lightbox').classList.remove('open'); };
document.addEventListener('keydown', (e) => {
  if (!document.getElementById('lightbox').classList.contains('open')) return;
  if (e.key === 'Escape') document.getElementById('lightbox').classList.remove('open');
  if (e.key === 'ArrowLeft') document.getElementById('lb-prev').click();
  if (e.key === 'ArrowRight') document.getElementById('lb-next').click();
});

init();
</script>
</body>
</html>
