<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Flujo Operativo — Llave Propia</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #EDF1F5;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }
    .card {
      background: #fff; border-radius: 16px; padding: 40px 36px;
      width: 340px; max-width: 90vw;
      box-shadow: 0 20px 60px rgba(0,0,0,.14); text-align: center;
    }
    .card img { height: 54px; display: block; margin: 0 auto 28px; }
    .card h2 { font-size: 20px; color: #16365C; font-weight: 700; margin-bottom: 6px; }
    .card p  { font-size: 13px; color: #6b7280; margin-bottom: 24px; }
    input {
      width: 100%; padding: 11px 14px; border: 1px solid #dbe3ec;
      border-radius: 10px; font-size: 14px; margin-bottom: 10px;
      outline: none; transition: border .15s; display: block;
    }
    input:focus { border-color: #10998B; }
    #p { margin-bottom: 18px; }
    button {
      width: 100%; padding: 12px; background: #16365C; color: #fff;
      border: none; border-radius: 10px; font-size: 15px; font-weight: 600;
      cursor: pointer; transition: background .15s;
    }
    button:hover { background: #0F2A49; }
    #err {
      display: none; background: #fee2e2; color: #991b1b;
      font-size: 12.5px; font-weight: 600; padding: 9px 12px;
      border-radius: 8px; margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <div class="card">
    <img src="/logo_llave_propia.jpeg" alt="Llave Propia">
    <h2>Acceso restringido</h2>
    <p>Ingresa tus credenciales para continuar</p>
    <div id="err">Usuario o contraseña incorrectos</div>
    <input id="u" type="text" placeholder="Usuario" autocomplete="username">
    <input id="p" type="password" placeholder="Contraseña" autocomplete="current-password">
    <button id="btn">Ingresar</button>
  </div>

  <script>
    document.getElementById('btn').addEventListener('click', tryAuth);
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') tryAuth();
    });

    function tryAuth() {
      var u = document.getElementById('u').value.trim();
      var p = document.getElementById('p').value.trim();
      if (u === 'rcanas' && p === 'rcanas') {
        window.location.href = '/flujo-operativo-llavepropia';
      } else {
        document.getElementById('err').style.display = 'block';
      }
    }
  </script>
</body>
</html>
